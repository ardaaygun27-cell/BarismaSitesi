<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barışma Mesajı</title>
    <style>
        body {
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .message-box {
            background-color: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
        }
        .message-box p {
            font-size: 18px;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="message-box">
        <p>💌 Sevgili [İlknur],</p>
        <p>Benim için çok önemlisin ve barışmak istiyorum. Seni tekrar görmek, birlikte güzel vakit geçirmek istiyorumdsadasdasda.</p>
        <p>Sevgiler, <br>Arda</p>
    </div>
</body>
</html>
